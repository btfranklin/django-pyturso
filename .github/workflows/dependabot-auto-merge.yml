name: Enable Dependabot auto-merge

on:
    pull_request_target:
        types: [opened, reopened]

permissions:
    contents: write
    pull-requests: write

jobs:
    enable-auto-merge:
        if: >-
            github.event.pull_request.user.login == 'app/dependabot' ||
            github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-24.04
        steps:
            - name: Enroll the pull request in squash auto-merge
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash
