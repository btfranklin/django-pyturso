name: Python package

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v7
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - run: pdm lock --check
            - run: pdm sync -G dev --clean
            - run: pdm run check
            - run: pdm run build
            - run: pdm run package-test

    dependency-review:
        name: Runtime dependency review
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v7
            - name: Review runtime dependency changes
              uses: actions/dependency-review-action@v5
              with:
                  config-file: ./.github/dependency-review-config.yml
