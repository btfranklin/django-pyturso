name: Verify Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: read

jobs:
    preflight:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref }}
            - name: Verify tag, immutable commit, and completed plan
              env:
                  TAG: ${{ github.ref_name }}
              run: |
                  test "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA"
                  test ! -e IMPLEMENTATION_PLAN.md || {
                    echo "IMPLEMENTATION_PLAN.md still contains release-blocking work" >&2
                    exit 1
                  }

    platform-verification:
        needs: preflight
        name: Platform (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: macos
                      os: macos-15
                    - label: linux
                      os: ubuntu-24.04
                    - label: windows
                      os: windows-2025
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - name: Install and verify the canonical resolution
              run: |
                  pdm sync -G dev --clean
                  pdm run check
            - name: Capture the driver/platform contract
              run: >-
                  pdm run python scripts/probes/driver_contract.py
                  --include-disposable-mutations
                  --output driver-platform.json
            - name: Upload driver/platform evidence
              uses: actions/upload-artifact@v7
              with:
                  name: driver-platform-${{ matrix.label }}
                  path: driver-platform.json

    deep-verification:
        needs: preflight
        runs-on: ubuntu-24.04
        timeout-minutes: 180
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - name: Install and validate the canonical lock
              run: |
                  pdm lock --check
                  pdm sync -L pdm.lock -G dev --clean
            - name: Run complete release verification
              run: |
                  pdm run coverage-check
                  pdm run test-differential
                  pdm run test-upstream
                  pdm run test-stress
                  pdm run test-performance
                  pdm run security
                  pdm run reproducible-build
                  pdm run mutation-critical
                  pdm run mutation-results

    verify-release:
        needs: [preflight, platform-verification, deep-verification]
        runs-on: macos-15
        timeout-minutes: 60
        permissions:
            contents: read
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref }}
            - name: Reverify tag and immutable commit identity
              env:
                  TAG: ${{ github.ref_name }}
              run: |
                  test "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA"
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - name: Install the release lock
              run: pdm sync -L pdm.lock -G dev --clean
            - name: Build and clean-install exact versioned artifacts
              env:
                  TAG: ${{ github.ref_name }}
              run: |
                  pdm run build
                  pdm run verify-release --expected-version "${TAG#v}"
            - name: Audit dependencies and generate SBOM
              run: |
                  pdm run audit
                  pdm run sbom
            - name: Record artifact hashes
              run: |
                  cd dist
                  sums_file=$(mktemp)
                  find . -type f ! -name SHA256SUMS -print0 \
                    | sort -z \
                    | xargs -0 shasum -a 256 > "$sums_file"
                  mv "$sums_file" SHA256SUMS
            - name: Attest exact release artifacts
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: |
                      dist/*.whl
                      dist/*.tar.gz
                      dist/sbom.cdx.json
