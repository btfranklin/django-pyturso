name: Verify Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: read

jobs:
    platform-verification:
        name: Platform (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: macos
                      os: macos-15
                    - label: linux
                      os: ubuntu-24.04
                    - label: windows
                      os: windows-2025
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v7
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - run: pdm lock --check
            - run: pdm sync -G dev --clean
            - run: pdm run check

    package-verification:
        needs: platform-verification
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v7
              with:
                  python-version: "3.14"
            - uses: pdm-project/setup-pdm@v4
            - run: pdm sync -G dev --clean
            - run: pdm run build
            - run: pdm run verify-release --expected-version "${GITHUB_REF_NAME#v}"
