behavior = "Add a defaulted field by table remake, preserve rows, and remove it again."

[[scenario]]
id = "introspection"
classification = "normalized_parity"
normalizer = "named constraints, relation columns, flags, and sorted user tables"
modes = ["memory", "file"]
behavior = "Compare table, primary-key, foreign-key, unique, and index discovery."

[[scenario]]
id = "backend_identity"
classification = "intentional_difference"
modes = ["memory", "file"]
behavior = "The configured ENGINE and display name truthfully identify different backends."
sqlite_expected = '{"display_name":"SQLite","engine":"django.db.backends.sqlite3"}'
turso_expected = '{"display_name":"Turso","engine":"django_pyturso"}'
rationale = "django-pyturso uses SQLite dialect dispatch but remains a distinct configured backend."

[[scenario]]
id = "random_function"
classification = "intentional_difference"
modes = ["memory", "file"]
behavior = "Django SQLite registers RAND while pyturso cannot register that compatibility UDF."
sqlite_expected = '{"count":4,"status":"supported"}'
turso_expected = '{"exception":"NotSupportedError","status":"rejected"}'
rationale = "The v1 backend rejects Random before SQL rather than silently changing semantics."
